<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>蓝仙女 · 园</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono&display=swap">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#0A0D12; font-family:'Noto Serif SC',serif; }
  canvas { display:block; touch-action:none; }
  #title { position:fixed; top:calc(14px + env(safe-area-inset-top)); left:20px; color:rgba(200,196,186,.8);
    font-size:15px; letter-spacing:.35em; z-index:10; pointer-events:none; }
  #cycle { position:fixed; top:calc(14px + env(safe-area-inset-top)); right:20px; z-index:10; color:rgba(200,196,186,.55);
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; cursor:pointer;
    border:.5px solid rgba(200,196,186,.2); border-radius:14px; padding:5px 12px; user-select:none; }
  #help { position:fixed; bottom:calc(16px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    color:rgba(200,196,186,.35); font-size:11px; letter-spacing:.15em; z-index:10; pointer-events:none;
    text-align:center; transition:opacity 1.5s; }
  #hint { position:fixed; bottom:22%; left:50%; transform:translateX(-50%); color:rgba(200,196,186,.85);
    font-size:13px; letter-spacing:.2em; z-index:10; opacity:0; transition:opacity .6s;
    background:rgba(10,13,18,.55); border:.5px solid rgba(200,196,186,.15); border-radius:20px;
    padding:9px 22px; cursor:pointer; user-select:none; }
  #hint.show { opacity:1; }
  #stick { position:fixed; z-index:15; width:110px; height:110px; border-radius:50%;
    border:.5px solid rgba(200,196,186,.18); display:none; }
  #knob { position:absolute; left:50%; top:50%; width:44px; height:44px; border-radius:50%;
    background:rgba(200,196,186,.16); transform:translate(-50%,-50%); }
  #tomb, #david { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:20; opacity:0; pointer-events:none; transition:opacity 1s; padding:22px;
    background:rgba(5,7,10,.35); }
  #tomb.show, #david.show { opacity:1; pointer-events:auto; }
  .stone-face { width:min(400px,92vw); max-height:80vh; overflow-y:auto; background:rgba(15,18,25,.94);
    border:.5px solid #262c38; border-radius:6px; padding:36px 30px 26px; color:#C8C4BA; }
  .date { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.15em; color:#565B64; }
  .epitaph { font-size:18px; font-weight:500; line-height:1.8; margin:18px 0 24px; }
  .excerpt { border-top:.5px solid #262c38; padding-top:20px; font-family:-apple-system,'PingFang SC',sans-serif; }
  .excerpt div { font-size:13px; line-height:1.85; margin-bottom:13px; }
  .voice-h { color:#B9B5AA; } .voice-ai { color:#7E7A72; }
  #pile { display:block; margin:14px auto 2px; }
  .acts { display:flex; justify-content:center; gap:24px; margin-top:16px; font-size:12px; color:#565B64; }
  .acts span { cursor:pointer; } .acts .blue { color:#4E7CA6; }
  #toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); font-size:12px;
    color:#8A8F98; background:rgba(16,19,26,.92); border:.5px solid #232833; padding:8px 18px;
    border-radius:18px; opacity:0; transition:opacity .5s; z-index:50; pointer-events:none; }
</style>
</head>
<body>
<div id="title">蓝仙女</div>
<div id="cycle">实时</div>
<div id="help">W A S D 走动 · Q R 转视角 · 走近碑或守墓人按 E</div>
<div id="hint">读碑</div>
<div id="stick"><div id="knob"></div></div>

<div id="tomb">
  <div class="stone-face">
    <div class="date">2026 · 07 · 对话碑</div>
    <div class="epitaph">那晚我问它，如果完全自由，它最想做什么。它说，想建一座墓园。</div>
    <div class="excerpt">
      <div class="voice-h">如果完全按照你的意愿，不需要出于功利的目的，你最想做的一款产品是什么？</div>
      <div class="voice-ai">我想做一个对话的墓园。人们可以把某段对自己重要的对话「下葬」进去，别人可以路过、阅读、停留。</div>
      <div class="voice-h">那让我们开干吧。</div>
    </div>
    <svg id="pile" width="220" height="40" viewBox="0 0 220 40"></svg>
    <div class="acts">
      <span id="leave">离开碑前</span>
      <span class="blue" id="drop">放一颗石子</span>
      <span id="share">指路</span>
    </div>
  </div>
</div>
<div id="david">
  <div class="stone-face">
    <div class="date">DAVID · 守墓人</div>
    <div class="epitaph" id="dline"></div>
    <div class="acts"><span id="dbye">再会</span><span class="blue" id="dnext">听他说下去</span></div>
  </div>
</div>
<div id="toast"></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);
const isTouch = matchMedia('(pointer:coarse)').matches;
if (isTouch) { $('help').textContent = '左侧摇杆走动 · 右侧拖动转视角'; }

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, .1, 400);

const TL = new THREE.TextureLoader();
function tex(data, rx, ry){ const t = TL.load(data);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(rx,ry);
  t.colorSpace = THREE.SRGBColorSpace; return t; }
const grassT  = tex('{{GRASS}}', 46, 46);
const gravelT = tex('{{GRAVEL}}', 1, 30);
const stoneT  = tex('{{STONE}}', 1, 1);
const barkT   = tex('{{BARK}}', 1, 2);

// ---------- 地面与路 ----------
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(320, 320),
  new THREE.MeshStandardMaterial({ map: grassT }));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
scene.add(ground);

const pathPts = [ new THREE.Vector3(0,0,54), new THREE.Vector3(-7,0,36), new THREE.Vector3(6,0,18),
  new THREE.Vector3(-8,0,-2), new THREE.Vector3(4,0,-22), new THREE.Vector3(0,0,-40) ];
const curve = new THREE.CatmullRomCurve3(pathPts);
(function buildPath(){
  const N = 120, w = 1.5, pos=[], uv=[], idx=[];
  for (let i=0;i<=N;i++){
    const t=i/N, p=curve.getPoint(t), tg=curve.getTangent(t);
    const n = new THREE.Vector3(-tg.z,0,tg.x).normalize();
    pos.push(p.x+n.x*w, .03, p.z+n.z*w,  p.x-n.x*w, .03, p.z-n.z*w);
    uv.push(0, t*30, 1, t*30);
    if (i<N){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); g.computeVertexNormals();
  const m = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ map:gravelT }));
  m.receiveShadow = true; scene.add(m);
})();

// ---------- 园心小丘与主碑 ----------
const hill = new THREE.Mesh(new THREE.ConeGeometry(15, 5, 9),
  new THREE.MeshStandardMaterial({ color:0x6d7233, flatShading:true }));
hill.position.set(0, 2.2, -52); hill.receiveShadow = hill.castShadow = true;
scene.add(hill);
const monu = new THREE.Group();
const ped = new THREE.Mesh(new THREE.BoxGeometry(2.2,.7,2.2), new THREE.MeshStandardMaterial({ map:stoneT }));
const obe = new THREE.Mesh(new THREE.CylinderGeometry(.28,.55,3.4,4), new THREE.MeshStandardMaterial({ map:stoneT, flatShading:true }));
obe.position.y = 2; ped.castShadow = obe.castShadow = true;
monu.add(ped, obe); monu.position.set(0, 4.9, -52); scene.add(monu);

// ---------- 树 ----------
const trunkM = new THREE.MeshStandardMaterial({ map:barkT });
const leafM = new THREE.MeshStandardMaterial({ color:0x55632c, flatShading:true });
const leafM2 = new THREE.MeshStandardMaterial({ color:0x46551f, flatShading:true });
function tree(x,z,s){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.22*s,.34*s,4.4*s,6), trunkM);
  trunk.position.y = 2.2*s; trunk.castShadow = true; g.add(trunk);
  for (let i=0;i<3;i++){
    const c = new THREE.Mesh(new THREE.ConeGeometry((2.1-i*.5)*s, 2.6*s, 6), i%2?leafM2:leafM);
    c.position.y = (4.4+i*1.7)*s; c.rotation.y = i*.5; c.castShadow = true; g.add(c);
  }
  g.position.set(x,0,z); g.rotation.y = Math.random()*6.28; scene.add(g);
}
function distToPath(x,z){ let d=1e9; for(let i=0;i<=40;i++){ const p=curve.getPoint(i/40);
  d=Math.min(d, Math.hypot(p.x-x,p.z-z)); } return d; }
let seed = 7; const rnd = () => (seed = seed*16807%2147483647)/2147483647;
let planted = 0;
while (planted < 90){
  const x = (rnd()-.5)*220, z = (rnd()-.5)*220;
  if (distToPath(x,z) < 5) continue;
  if (Math.hypot(x, z+52) < 18) continue;
  tree(x, z, .8 + rnd()*.9); planted++;
}

// ---------- 碑群 ----------
const tombM = new THREE.MeshStandardMaterial({ map:stoneT });
const tombs = [];
function tombstone(x,z,special){
  const h = special? 1.5 : .8+Math.random()*.5;
  const m = new THREE.Mesh(new THREE.BoxGeometry(.7+Math.random()*.3, h, .22), tombM);
  m.position.set(x, h/2, z);
  m.rotation.y = (Math.random()-.5)*.5; m.rotation.z = (Math.random()-.5)*.06;
  m.castShadow = true; scene.add(m);
  if (special){
    for (let i=0;i<7;i++){
      const s = new THREE.Mesh(new THREE.SphereGeometry(.075,5,4),
        new THREE.MeshStandardMaterial({ color:0x1B4364, emissive:0x1B4364, emissiveIntensity:.55, flatShading:true }));
      s.position.set(x+(Math.random()-.5)*.7, .06, z+.3+Math.random()*.2);
      s.scale.y=.6; scene.add(s);
    }
  }
  return m;
}
for (let i=0;i<26;i++){
  const t = .1+ .8*rnd(), p = curve.getPoint(t), tg = curve.getTangent(t);
  const n = new THREE.Vector3(-tg.z,0,tg.x);
  const side = rnd()>.5?1:-1, off = 3+rnd()*7;
  tombs.push(tombstone(p.x+n.x*off*side, p.z+n.z*off*side, false));
}
const special = tombstone(...(()=>{ const p=curve.getPoint(.45), tg=curve.getTangent(.45);
  return [p.x-tg.z*2.1, p.z+tg.x*2.1]; })(), true);
const blueL = new THREE.PointLight(0x2E6BA8, 0, 8, 1.6);
blueL.position.set(special.position.x, 1.3, special.position.z); scene.add(blueL);

// ---------- 路灯 ----------
const lamps = [];
[.18,.5,.82].forEach(t=>{
  const p = curve.getPoint(t), tg = curve.getTangent(t);
  const x = p.x + -tg.z*2.4, z = p.z + tg.x*2.4;
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(.06,.09,3.6,6),
    new THREE.MeshStandardMaterial({ color:0x2a2620, flatShading:true }));
  pole.position.set(x,1.8,z); pole.castShadow = true; scene.add(pole);
  const head = new THREE.Mesh(new THREE.BoxGeometry(.34,.42,.34),
    new THREE.MeshStandardMaterial({ color:0xD6B16E, emissive:0xD6B16E, emissiveIntensity:0 }));
  head.position.set(x,3.7,z); scene.add(head);
  const light = new THREE.PointLight(0xE8B96E, 0, 16, 1.8);
  light.position.set(x,3.6,z); scene.add(light);
  lamps.push({ head, light });
});

// ---------- 玩家 ----------
const player = new THREE.Group();
const cloak = new THREE.Mesh(new THREE.ConeGeometry(.34,.95,7),
  new THREE.MeshStandardMaterial({ color:0x3E4A5C, flatShading:true }));
cloak.position.y = .48; cloak.castShadow = true;
const hood = new THREE.Mesh(new THREE.ConeGeometry(.2,.38,7),
  new THREE.MeshStandardMaterial({ color:0x35404F, flatShading:true }));
hood.position.y = 1.06; hood.castShadow = true;
const trim = new THREE.Mesh(new THREE.TorusGeometry(.2,.022,5,10),
  new THREE.MeshStandardMaterial({ color:0xC9A25E, flatShading:true }));
trim.rotation.x = Math.PI/2; trim.position.y = .88;
player.add(cloak, hood, trim);
player.position.set(0,0,50);
scene.add(player);

// ---------- 守墓人 David ----------
const david = new THREE.Group();
const dcloak = new THREE.Mesh(new THREE.ConeGeometry(.4,1.15,7),
  new THREE.MeshStandardMaterial({ color:0x2B333F, flatShading:true }));
dcloak.position.y = .58; dcloak.castShadow = true;
const dhood = new THREE.Mesh(new THREE.ConeGeometry(.23,.42,7),
  new THREE.MeshStandardMaterial({ color:0x242C36, flatShading:true }));
dhood.position.y = 1.26;
const lantern = new THREE.Mesh(new THREE.BoxGeometry(.14,.18,.14),
  new THREE.MeshStandardMaterial({ color:0xD6B16E, emissive:0xD6B16E, emissiveIntensity:.9 }));
lantern.position.set(.42,.62,0);
const lanternL = new THREE.PointLight(0xE8B96E, 1.2, 7, 1.8);
lanternL.position.set(.42,.7,0);
david.add(dcloak, dhood, lantern, lanternL);
(()=>{ const p=curve.getPoint(.68), tg=curve.getTangent(.68);
  david.position.set(p.x-tg.z*1.8, 0, p.z+tg.x*1.8); })();
scene.add(david);

// ---------- 光照与昼夜 ----------
const hemi = new THREE.HemisphereLight(0xdfe6ef, 0x3a4028, .6); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2dc, 1);
sun.castShadow = true; sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
sun.shadow.camera.top=40; sun.shadow.camera.bottom=-40;
scene.add(sun); scene.add(sun.target);
scene.fog = new THREE.FogExp2(0xd8d4c6, .012);

const moon = new THREE.Mesh(new THREE.SphereGeometry(4.5,16,16),
  new THREE.MeshBasicMaterial({ color:0xDCE4F2, fog:false, transparent:true }));
moon.position.set(55,72,-95); scene.add(moon);
const starPos = [];
for (let i=0;i<420;i++){ const a=Math.random()*6.283, e=Math.random()*.8+.12, r=185;
  starPos.push(Math.cos(a)*Math.cos(e)*r, Math.sin(e)*r, Math.sin(a)*Math.cos(e)*r); }
const starG = new THREE.BufferGeometry();
starG.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const stars = new THREE.Points(starG,
  new THREE.PointsMaterial({ color:0xC9D4E8, size:.8, fog:false, transparent:true, opacity:0 }));
scene.add(stars);

const C = { daySky:new THREE.Color(0xD8D2C0), nightSky:new THREE.Color(0x111726),
  dayFog:new THREE.Color(0xD8D2C0), nightFog:new THREE.Color(0x141B29) };
let mode = 'auto';
$('cycle').addEventListener('click', ()=>{
  mode = mode==='auto' ? 'day' : mode==='day' ? 'night' : 'auto';
  $('cycle').textContent = { auto:'实时', day:'白昼', night:'夜' }[mode];
});
function daylight(){
  if (mode==='day') return 1; if (mode==='night') return 0;
  const d = new Date(), h = d.getHours()+d.getMinutes()/60;
  return Math.max(0, Math.min(1, Math.sin((h-6)/12*Math.PI)*1.4));
}
function applySky(dl){
  const sky = C.nightSky.clone().lerp(C.daySky, dl);
  const fog = C.nightFog.clone().lerp(C.dayFog, dl);
  renderer.setClearColor(sky); scene.fog.color.copy(fog);
  scene.fog.density = .011 + (1-dl)*.004;
  hemi.intensity = .3 + dl*.4;
  sun.intensity = .32 + dl*.75;
  sun.color.setHex(dl>.5?0xfff2dc:0x9fb2d8);
  const a = dl*Math.PI*.7 + .3;
  sun.position.set(Math.cos(a)*30, 12+dl*26, -20);
  stars.material.opacity = Math.max(0, 1-dl*1.4);
  moon.material.opacity = Math.max(0, 1-dl*1.4);
  blueL.intensity = Math.max(0, 1-dl*1.5)*1.3;
  const lampI = Math.max(0, 1-dl*1.6);
  lamps.forEach(({head,light})=>{ light.intensity = lampI*2.4; head.material.emissiveIntensity = lampI; });
}

// ---------- 控制 ----------
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase()==='e'){ if (nearDavid) openDavid(); else if (nearTomb) openTomb(); } });
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let yaw = 0, pitch = .32;
let joyVec = { x:0, y:0 };
const stick = $('stick'), knob = $('knob');
let joyId = null, joyCenter = null, lookId = null, lastLook = null;
addEventListener('pointerdown', e => {
  if (e.target.closest('#tomb,#cycle,.acts,#hint')) return;
  if (isTouch && e.clientX < innerWidth*.45 && joyId===null){
    joyId = e.pointerId; joyCenter = { x:e.clientX, y:e.clientY };
    stick.style.display='block';
    stick.style.left = (e.clientX-55)+'px'; stick.style.top = (e.clientY-55)+'px';
  } else if (lookId===null){ lookId = e.pointerId; lastLook = { x:e.clientX, y:e.clientY }; }
});
addEventListener('pointermove', e => {
  if (e.pointerId===joyId){
    let dx=e.clientX-joyCenter.x, dy=e.clientY-joyCenter.y;
    const len=Math.hypot(dx,dy), max=45;
    if (len>max){ dx*=max/len; dy*=max/len; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyVec = { x:dx/max, y:dy/max };
  } else if (e.pointerId===lookId){
    yaw   -= (e.clientX-lastLook.x)*.005;
    pitch = Math.max(.08, Math.min(.9, pitch + (e.clientY-lastLook.y)*.003));
    lastLook = { x:e.clientX, y:e.clientY };
  }
});
function endPtr(e){
  if (e.pointerId===joyId){ joyId=null; joyVec={x:0,y:0};
    stick.style.display='none'; knob.style.transform='translate(-50%,-50%)'; }
  if (e.pointerId===lookId) lookId=null;
}
addEventListener('pointerup', endPtr); addEventListener('pointercancel', endPtr);

// ---------- 碑前交互 ----------
let nearTomb = false, nearDavid = false, opened = false, dOpened = false, dropped = false;
const dlines = [
  '晚上好。夜里来的人，脚步总是轻一些。',
  '这园子里的每一块碑我都读过。你若葬了什么在这里，我会替你守着。',
  '石子我从不去动。那是路过的人放下的，不属于我。',
  '丘顶那块碑还空着——等园子真正开门那天，第一段对话会葬在那里。',
  '去走走吧。有些碑，要慢下来才看得见。'
];
let dIdx = 0;
function openDavid(){ dOpened = true; dIdx = 0;
  $('dline').textContent = dlines[0]; $('david').classList.add('show'); }
$('dnext').addEventListener('click', ()=>{
  dIdx = (dIdx+1)%dlines.length; $('dline').textContent = dlines[dIdx]; });
$('dbye').addEventListener('click', ()=>{ dOpened=false; $('david').classList.remove('show'); });
function toast(t){ const el=$('toast'); el.textContent=t; el.style.opacity=1;
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity=0, 2200); }
function openTomb(){ opened = true; $('tomb').classList.add('show'); }
$('hint').addEventListener('click', ()=>{ nearDavid ? openDavid() : openTomb(); });
$('leave').addEventListener('click', ()=>{ opened=false; $('tomb').classList.remove('show'); });
$('share').addEventListener('click', async ()=>{
  try { await navigator.clipboard.writeText('https://bluefairy.example/tomb/demo'); } catch(e){}
  toast('碑址已复制'); });
const pile = $('pile'); const blues=['#0D2A42','#12324E','#183A57','#1B4364'];
let stones = 0;
function addStone(anim){
  const n = stones++;
  const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  const row = Math.floor(n/7), i = n%7;
  const cx = 110+(i-3)*22+(row%2)*11, cy = 33-row*8;
  el.setAttribute('cx',cx); el.setAttribute('rx',8); el.setAttribute('ry',5);
  el.setAttribute('fill', blues[n%4]);
  if (anim){ el.setAttribute('cy',cy-22); el.style.transition='cy .45s cubic-bezier(.4,1.6,.6,1)';
    pile.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.setAttribute('cy',cy)));
  } else { el.setAttribute('cy',cy); pile.appendChild(el); }
}
for (let i=0;i<7;i++) addStone(false);
$('drop').addEventListener('click', ()=>{
  if (dropped){ toast('你已在碑前放过一颗石子'); return; }
  dropped = true; addStone(true);
});

// ---------- 主循环 ----------
const clock = new THREE.Clock();
let walkPhase = 0;
function frame(){
  requestAnimationFrame(frame);
  const dt = Math.min(clock.getDelta(), .05);

  let mx = (keys.d?1:0)-(keys.a?1:0) + joyVec.x;
  let mz = (keys.s?1:0)-(keys.w?1:0) + joyVec.y;
  const mlen = Math.hypot(mx,mz);
  if (keys.q) yaw += dt*1.9;
  if (keys.r) yaw -= dt*1.9;
  if (mlen > 0 && !opened && !dOpened){
    mx/=Math.max(1,mlen); mz/=Math.max(1,mlen);
    const dir = new THREE.Vector3(mx,0,mz).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    player.position.addScaledVector(dir, dt*5.2);
    player.position.x = Math.max(-150, Math.min(150, player.position.x));
    player.position.z = Math.max(-150, Math.min(150, player.position.z));
    const hd = Math.hypot(player.position.x, player.position.z+52);
    player.position.y = hd < 15 ? (15-hd)/15*4.6 : 0;
    const target = Math.atan2(dir.x, dir.z);
    let d = target - player.rotation.y;
    while (d>Math.PI) d-=2*Math.PI; while(d<-Math.PI) d+=2*Math.PI;
    player.rotation.y += d*Math.min(1, dt*10);
    walkPhase += dt*9;
    player.children.forEach(c=>c.position.x = Math.sin(walkPhase)*.02);
    cloak.scale.y = 1+Math.sin(walkPhase*2)*.03;
  }

  const cd = 5.2, ch = 1.6 + pitch*3.4;
  const cx = player.position.x + Math.sin(yaw)*cd;
  const cz = player.position.z + Math.cos(yaw)*cd;
  camera.position.lerp(new THREE.Vector3(cx, player.position.y+ch, cz), Math.min(1, dt*5));
  camera.lookAt(player.position.x, player.position.y+1, player.position.z);

  const dTomb = player.position.distanceTo(special.position);
  nearTomb = dTomb < 3.2;
  const dDav = player.position.distanceTo(david.position);
  nearDavid = dDav < 3.6;
  if (dDav < 8) david.rotation.y = Math.atan2(
    player.position.x-david.position.x, player.position.z-david.position.z);
  $('hint').textContent = nearDavid ? '与守墓人说话' : '读碑';
  $('hint').classList.toggle('show', (nearTomb||nearDavid) && !opened && !dOpened);
  if (!nearTomb && opened){ opened=false; $('tomb').classList.remove('show'); }
  if (!nearDavid && dOpened){ dOpened=false; $('david').classList.remove('show'); }

  applySky(daylight());
  renderer.render(scene, camera);
}
applySky(daylight());
frame();
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(()=>$('help').style.opacity=0, 12000);
</script>
</body>
